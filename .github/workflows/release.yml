name: Release

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build macOS (Universal Binary)
        run: |
          cd MacHost
          swift test
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          mkdir -p .build/release-universal
          lipo -create \
            .build/arm64-apple-macosx/release/SideScreen \
            .build/x86_64-apple-macosx/release/SideScreen \
            -output .build/release-universal/SideScreen
          lipo -create \
            .build/arm64-apple-macosx/release/SideScreenVirtualHIDHelper \
            .build/x86_64-apple-macosx/release/SideScreenVirtualHIDHelper \
            -output .build/release-universal/SideScreenVirtualHIDHelper

      - name: Create .app bundle
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APP_DIR="SideScreen.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp MacHost/.build/release-universal/SideScreen "$APP_DIR/Contents/MacOS/"
          cp MacHost/.build/release-universal/SideScreenVirtualHIDHelper "$APP_DIR/Contents/MacOS/"

          # Copy icon if exists
          if [ -f "MacHost/Resources/AppIcon.icns" ]; then
            cp MacHost/Resources/AppIcon.icns "$APP_DIR/Contents/Resources/"
          fi

          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>SideScreen</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.sidescreen.app</string>
              <key>CFBundleName</key>
              <string>Side Screen</string>
              <key>CFBundleDisplayName</key>
              <string>Side Screen</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <false/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
              <key>NSScreenCaptureUsageDescription</key>
              <string>Side Screen needs screen recording access to capture your virtual display and stream it to your Android device.</string>
              <key>NSLocalNetworkUsageDescription</key>
              <string>Side Screen needs Local Network access so your Android tablet can connect to the Mac over WiFi for wireless mode. Without this, only USB-tethered connections work.</string>
              <key>NSBonjourServices</key>
              <array>
                  <string>_sidescreen._tcp</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Import Developer ID certificate
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
        run: |
          for name in MAC_CERTIFICATE_BASE64 MAC_CERTIFICATE_PASSWORD MAC_KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing $name secret"
              exit 1
            fi
          done

          KEYCHAIN_PATH="$RUNNER_TEMP/sidescreen-signing.keychain-db"
          echo "$MAC_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/developer-id.p12" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Developer ID code sign
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
        run: |
          if [ -z "$MAC_CODESIGN_IDENTITY" ]; then
            echo "Missing MAC_CODESIGN_IDENTITY secret"
            exit 1
          fi
          codesign --force --deep --timestamp --options runtime \
            --sign "$MAC_CODESIGN_IDENTITY" \
            --entitlements MacHost/SideScreen.entitlements \
            SideScreen.app

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dmg-content
          cp -R SideScreen.app dmg-content/
          ln -s /Applications dmg-content/Applications
          hdiutil create -volname "Side Screen" -srcfolder dmg-content -ov -format UDZO "SideScreen-${VERSION}-mac-universal.dmg"
          rm -rf dmg-content

      - name: Sign and notarize DMG
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG="SideScreen-${VERSION}-mac-universal.dmg"
          for name in MAC_CODESIGN_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing $name secret"
              exit 1
            fi
          done

          codesign --force --timestamp --sign "$MAC_CODESIGN_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"
          spctl -a -vv -t open --context context:primary-signature "$DMG"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android release artifacts
        env:
          SIDESCREEN_RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIDESCREEN_RELEASE_STORE_PASSWORD: ${{ secrets.SIDESCREEN_RELEASE_STORE_PASSWORD }}
          SIDESCREEN_RELEASE_KEY_ALIAS: ${{ secrets.SIDESCREEN_RELEASE_KEY_ALIAS }}
          SIDESCREEN_RELEASE_KEY_PASSWORD: ${{ secrets.SIDESCREEN_RELEASE_KEY_PASSWORD }}
          SIDESCREEN_REQUIRE_RELEASE_SIGNING: "1"
        run: |
          if [ -z "${{ secrets.SIDESCREEN_RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Missing SIDESCREEN_RELEASE_KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "${{ secrets.SIDESCREEN_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          cd AndroidClient
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleRelease bundleRelease

      - name: Rename Android artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp AndroidClient/app/build/outputs/apk/release/app-release.apk "SideScreen-${VERSION}-android.apk"
          cp AndroidClient/app/build/outputs/bundle/release/app-release.aab "SideScreen-${VERSION}-android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            *.apk
            *.aab

  create-release:
    needs: [build-mac, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Extract this version's section from CHANGELOG.md (heading to next ---).
          # The section already contains Added/Fixed/Notes/Installation.
          VERSION=$(cat VERSION)
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^---/ {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          find artifacts -type f \( -name "*.dmg" -o -name "*.apk" -o -name "*.aab" \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                checksum=$(shasum -a 256 "$file" | awk '{print $1}')
                printf "%s  %s\n" "$checksum" "$(basename "$file")"
              done > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Side Screen v${{ steps.version.outputs.version }}"
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.notes }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `SideScreen-${{ steps.version.outputs.version }}-mac-universal.dmg` |
            | Android | `SideScreen-${{ steps.version.outputs.version }}-android.apk` |
            | Android Play Store | `SideScreen-${{ steps.version.outputs.version }}-android.aab` |
            | Checksums | `SHA256SUMS.txt` |
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/android-artifacts/*.apk
            artifacts/android-artifacts/*.aab
            SHA256SUMS.txt
          draft: false
          prerelease: false
